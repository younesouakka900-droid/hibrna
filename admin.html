<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVerse — لوحة الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --s1: #0f0f1a;
  --s2: #13131f;
  --s3: #1a1a2e;
  --red: #e8192c;
  --red2: #ff3347;
  --gold: #f59e0b;
  --green: #22c55e;
  --blue: #3b82f6;
  --w: #f0f0ff;
  --mu: rgba(240,240,255,.5);
  --br: rgba(240,240,255,.08);
  --br2: rgba(240,240,255,.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--w);min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{
  position:fixed;top:0;right:0;width:240px;height:100vh;
  background:var(--s1);border-left:1px solid var(--br);
  display:flex;flex-direction:column;z-index:100;
}
.logo{
  padding:1.5rem 1.2rem;border-bottom:1px solid var(--br);
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;
  color:var(--red);display:flex;align-items:center;gap:.6rem;
}
.logo span{font-family:'Tajawal';font-size:.65rem;color:var(--mu);font-weight:500;letter-spacing:1px;display:block;margin-top:-4px}
.nav{flex:1;padding:1rem 0;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:.8rem;
  padding:.75rem 1.2rem;cursor:pointer;
  font-size:.9rem;font-weight:600;color:var(--mu);
  border-right:3px solid transparent;
  transition:all .2s;position:relative;
}
.nav-item:hover{color:var(--w);background:rgba(240,240,255,.04);}
.nav-item.active{color:var(--red);border-right-color:var(--red);background:rgba(232,25,44,.07);}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center;}
.nav-badge{
  margin-right:auto;background:var(--red);color:#fff;
  font-size:.65rem;font-weight:800;padding:.15rem .45rem;
  border-radius:20px;min-width:18px;text-align:center;
}
.sidebar-footer{
  padding:1rem 1.2rem;border-top:1px solid var(--br);
  font-size:.75rem;color:var(--mu);
}
.admin-tag{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(232,25,44,.15);border:1px solid rgba(232,25,44,.3);
  color:var(--red);padding:.3rem .7rem;border-radius:20px;
  font-size:.72rem;font-weight:700;margin-bottom:.5rem;
}

/* ─── MAIN ─── */
.main{margin-right:240px;min-height:100vh;}
.topbar{
  background:var(--s1);border-bottom:1px solid var(--br);
  padding:1rem 1.8rem;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:50;
}
.page-title{font-size:1.2rem;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.refresh-btn{
  background:rgba(240,240,255,.06);border:1px solid var(--br2);
  color:var(--mu);padding:.45rem .9rem;border-radius:8px;
  font-family:'Tajawal';font-size:.82rem;cursor:pointer;transition:all .2s;
}
.refresh-btn:hover{color:var(--w);border-color:var(--br2);}
.content{padding:1.8rem;}

/* ─── STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.8rem;}
.stat-box{
  background:var(--s2);border:1px solid var(--br);border-radius:14px;
  padding:1.2rem 1.4rem;position:relative;overflow:hidden;transition:transform .2s;
}
.stat-box:hover{transform:translateY(-2px);}
.stat-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--accent,var(--red));
}
.stat-box.green{--accent:var(--green);}
.stat-box.blue{--accent:var(--blue);}
.stat-box.gold{--accent:var(--gold);}
.stat-num{font-size:2rem;font-weight:900;line-height:1;}
.stat-lbl{font-size:.78rem;color:var(--mu);margin-top:.3rem;font-weight:600;}
.stat-icon{position:absolute;top:1rem;left:1.2rem;font-size:1.6rem;opacity:.15;}

/* ─── SECTION ─── */
.section{background:var(--s2);border:1px solid var(--br);border-radius:14px;margin-bottom:1.5rem;}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.4rem;border-bottom:1px solid var(--br);
}
.sec-title{font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:.5rem;}
.sec-body{padding:0;}

/* ─── TABLE ─── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  padding:.7rem 1rem;text-align:right;font-size:.75rem;
  color:var(--mu);font-weight:700;letter-spacing:.5px;
  border-bottom:1px solid var(--br);background:rgba(240,240,255,.02);
}
.tbl td{
  padding:.85rem 1rem;font-size:.84rem;border-bottom:1px solid var(--br);
  vertical-align:middle;
}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(240,240,255,.02);}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .6rem;border-radius:20px;font-size:.72rem;font-weight:700;}
.badge-red{background:rgba(232,25,44,.15);color:#ff6b7a;border:1px solid rgba(232,25,44,.3);}
.badge-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);}
.badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);}
.badge-gold{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.25);}

/* ─── BUTTONS ─── */
.btn{padding:.4rem .85rem;border-radius:8px;font-family:'Tajawal';font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;border:none;}
.btn-red{background:rgba(232,25,44,.15);color:var(--red);border:1px solid rgba(232,25,44,.3);}
.btn-red:hover{background:var(--red);color:#fff;}
.btn-green{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
.btn-green:hover{background:#22c55e;color:#000;}
.btn-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);}
.btn-blue:hover{background:#3b82f6;color:#fff;}
.btn-ghost{background:transparent;color:var(--mu);border:1px solid var(--br2);}
.btn-ghost:hover{color:var(--w);border-color:var(--br2);}

/* ─── USER AVATAR ─── */
.av{width:32px;height:32px;border-radius:50%;background:var(--red);display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;vertical-align:middle;margin-left:.5rem;background-size:cover;background-position:center;}

/* ─── EMPTY ─── */
.empty{padding:3rem;text-align:center;color:var(--mu);font-size:.9rem;}

/* ─── LOADING ─── */
.loading{padding:2rem;text-align:center;color:var(--mu);font-size:.85rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--br2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:.5rem;}

/* ─── MODAL ─── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.mo.open{display:flex;}
.md{background:var(--s2);border:1px solid var(--br2);border-radius:18px;padding:1.8rem;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.mh h2{font-size:1rem;font-weight:800;}
.mclose{background:rgba(240,240,255,.08);border:none;color:var(--mu);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;transition:all .2s;}
.mclose:hover{color:var(--w);background:rgba(240,240,255,.15);}
.confirm-msg{font-size:.9rem;color:var(--mu);line-height:1.7;margin-bottom:1.4rem;}
.confirm-msg strong{color:var(--w);}
.modal-actions{display:flex;gap:.7rem;justify-content:flex-end;}

/* ─── TAB ─── */
.tabs{display:flex;gap:.4rem;padding:1rem 1.4rem 0;}
.tab{padding:.5rem 1rem;border-radius:8px 8px 0 0;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--mu);border:1px solid transparent;border-bottom:none;transition:all .2s;}
.tab.active{color:var(--w);background:var(--s3);border-color:var(--br);}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--s3);border:1px solid var(--br2);color:var(--w);
  padding:.7rem 1.4rem;border-radius:12px;font-size:.85rem;font-weight:600;
  z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.e{border-color:rgba(232,25,44,.5);color:#ff6b7a;}
.toast.s{border-color:rgba(34,197,94,.4);color:#4ade80;}

/* ─── SEARCH ─── */
.search-wrap{padding:.8rem 1.4rem;border-bottom:1px solid var(--br);}
.search-inp{
  width:100%;background:rgba(240,240,255,.05);border:1px solid var(--br);
  border-radius:10px;padding:.6rem 1rem;color:var(--w);font-family:'Tajawal';
  font-size:.85rem;outline:none;transition:border .2s;
}
.search-inp:focus{border-color:rgba(232,25,44,.4);}
.search-inp::placeholder{color:var(--mu);}

/* ─── NOT ADMIN ─── */
.not-admin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;text-align:center;padding:2rem;}
.not-admin h1{font-size:2rem;font-weight:900;color:var(--red);}
.not-admin p{color:var(--mu);font-size:.9rem;}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .sidebar{width:200px;}
  .main{margin-right:200px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:540px){
  .sidebar{position:fixed;right:-200px;transition:right .3s;}
  .sidebar.open{right:0;}
  .main{margin-right:0;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">
    🔥 MV
    <div><span>ADMIN PANEL</span></div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="showTab('reports')" id="nav-reports">
      <span class="icon">🚩</span> البلاغات
      <span class="nav-badge" id="reports-badge" style="display:none">0</span>
    </div>
    <div class="nav-item" onclick="showTab('works')" id="nav-works">
      <span class="icon">📚</span> الأعمال
    </div>
    <div class="nav-item" onclick="showTab('users')" id="nav-users">
      <span class="icon">👥</span> المستخدمون
    </div>
    <div class="nav-item" onclick="showTab('stats')" id="nav-stats">
      <span class="icon">📊</span> الإحصائيات
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-tag">🛡️ أدمن</div>
    <div id="admin-email" style="font-size:.72rem;color:var(--mu)"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="page-title" id="page-title">🚩 البلاغات</div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshCurrent()">🔄 تحديث</button>
      <button class="refresh-btn btn-red" onclick="doSignOut()" style="color:var(--red)">خروج</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="main-content">
    <div class="loading"><span class="spinner"></span> جاري التحقق من الصلاحيات...</div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="mo" id="m-confirm">
  <div class="md">
    <div class="mh">
      <h2 id="confirm-title">تأكيد الإجراء</h2>
      <button class="mclose" onclick="closeModal('m-confirm')">✕</button>
    </div>
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('m-confirm')">إلغاء</button>
      <button class="btn btn-red" id="confirm-ok-btn" onclick="">تأكيد</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, getDoc, doc,
  deleteDoc, updateDoc, query, orderBy, where, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyAzRxV19fXvYjY_3LSmW2LVnIYrCbkaVOk",
  authDomain:"mangaverse-69f6b.firebaseapp.com",
  projectId:"mangaverse-69f6b",
  storageBucket:"mangaverse-69f6b.firebasestorage.app",
  messagingSenderId:"1019528073160",
  appId:"1:1019528073160:web:0afcb6826997ced3fdbafd"
};

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

const ADMIN_EMAIL = "younassouakka@gmail.com";
let CU = null;
let _curTab = "reports";

// ─── AUTH CHECK ───
onAuthStateChanged(auth, async user => {
  if(!user || user.email !== ADMIN_EMAIL){
    document.getElementById("main-content").innerHTML = `
      <div class="not-admin">
        <h1>🔐 وصول مرفوض</h1>
        <p>هذه الصفحة مخصصة للأدمن فقط</p>
        <button class="btn btn-red" onclick="window.location.href='/'" style="margin-top:1rem;padding:.6rem 1.4rem">
          العودة للموقع
        </button>
      </div>`;
    return;
  }
  CU = user;
  document.getElementById("admin-email").textContent = user.email;
  await loadStats();
  showTab("reports");
});

// ─── TABS ───
window.showTab = async function(tab){
  _curTab = tab;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  document.getElementById("nav-"+tab)?.classList.add("active");
  const titles = {reports:"🚩 البلاغات", works:"📚 الأعمال", users:"👥 المستخدمون", stats:"📊 الإحصائيات"};
  document.getElementById("page-title").textContent = titles[tab]||tab;
  if(tab==="reports") await loadReports();
  else if(tab==="works") await loadWorks();
  else if(tab==="users") await loadUsers();
  else if(tab==="stats") await loadStatsPage();
};

window.refreshCurrent = ()=> window.showTab(_curTab);

// ─── STATS (topbar cards) ───
let _statsData = {};
async function loadStats(){
  try{
    const [worksSnap, usersSnap, reportsSnap] = await Promise.all([
      getDocs(collection(db,"works")),
      getDocs(collection(db,"users")),
      getDocs(collection(db,"reports"))
    ]);
    _statsData = {
      works: worksSnap.size,
      users: usersSnap.size,
      reports: reportsSnap.size,
      totalViews: worksSnap.docs.reduce((s,d)=>s+(d.data().views||0),0)
    };
    const badge = document.getElementById("reports-badge");
    if(reportsSnap.size > 0){
      badge.textContent = reportsSnap.size;
      badge.style.display = "inline-block";
    }
  } catch(e){ console.log(e); }
}

// ─── REPORTS PAGE ───
async function loadReports(){
  const el = document.getElementById("main-content");
  el.innerHTML = `<div class="loading"><span class="spinner"></span> جاري تحميل البلاغات...</div>`;
  try{
    const snap = await getDocs(query(collection(db,"reports"), orderBy("createdAt","desc")));
    if(snap.empty){
      el.innerHTML = `
        <div class="section">
          <div class="sec-head"><div class="sec-title">🚩 البلاغات</div></div>
          <div class="empty">✅ لا توجد بلاغات حالياً</div>
        </div>`;
      return;
    }
    const rows = snap.docs.map(d=>{
      const r = d.data();
      const date = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString("ar-SA") : "—";
      return `
        <tr>
          <td><span class="badge badge-red">🚩 ${r.reason||"—"}</span></td>
          <td style="color:var(--mu);font-size:.8rem">${r.details||"—"}</td>
          <td style="color:var(--mu);font-size:.78rem">${r.reporterName||"مجهول"}</td>
          <td style="color:var(--mu);font-size:.78rem">${date}</td>
          <td>
            <div style="display:flex;gap:.4rem;flex-wrap:wrap">
              <button class="btn btn-blue" onclick="viewWork('${r.workId}')">👁 عرض</button>
              <button class="btn btn-red" onclick="confirmDeleteWork('${r.workId}','${d.id}')">🗑 حذف العمل</button>
              <button class="btn btn-ghost" onclick="dismissReport('${d.id}')">✓ تجاهل</button>
            </div>
          </td>
        </tr>`;
    }).join("");
    el.innerHTML = `
      <div class="section">
        <div class="sec-head">
          <div class="sec-title">🚩 البلاغات <span class="badge badge-red">${snap.size}</span></div>
        </div>
        <div class="sec-body">
          <table class="tbl">
            <thead><tr>
              <th>السبب</th><th>التفاصيل</th><th>المُبلِّغ</th><th>التاريخ</th><th>إجراء</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e){
    el.innerHTML = `<div class="empty">❌ خطأ في تحميل البلاغات: ${e.message}</div>`;
  }
}

// ─── WORKS PAGE ───
async function loadWorks(){
  const el = document.getElementById("main-content");
  el.innerHTML = `<div class="loading"><span class="spinner"></span> جاري تحميل الأعمال...</div>`;
  try{
    const snap = await getDocs(query(collection(db,"works"), orderBy("createdAt","desc"), limit(50)));
    if(snap.empty){ el.innerHTML = `<div class="section"><div class="empty">لا توجد أعمال</div></div>`; return; }
    const rows = snap.docs.map(d=>{
      const w = d.data();
      const date = w.createdAt?.toDate ? w.createdAt.toDate().toLocaleDateString("ar-SA") : "—";
      const statusBadge = w.status==="مكتمل"?"badge-green":w.status==="متوقف"?"badge-red":"badge-blue";
      return `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:.6rem">
              ${w.cover?`<img src="${w.cover}" style="width:36px;height:50px;object-fit:cover;border-radius:5px;flex-shrink:0">`:'<div style="width:36px;height:50px;background:var(--s3);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.7rem">📚</div>'}
              <div>
                <div style="font-weight:700;font-size:.85rem">${w.title||"—"}</div>
                <div style="font-size:.72rem;color:var(--mu)">${w.authorName||"—"}</div>
              </div>
            </div>
          </td>
          <td><span class="badge badge-blue">${w.type||"—"}</span></td>
          <td><span class="badge ${statusBadge}">${w.status||"—"}</span></td>
          <td style="color:var(--mu);font-size:.8rem">👁 ${w.views||0} &nbsp; ❤️ ${(w.likes||[]).length||0}</td>
          <td style="color:var(--mu);font-size:.78rem">${date}</td>
          <td>
            <button class="btn btn-red" onclick="confirmDeleteWork('${d.id}',null)">🗑 حذف</button>
          </td>
        </tr>`;
    }).join("");
    el.innerHTML = `
      <div class="section">
        <div class="sec-head">
          <div class="sec-title">📚 الأعمال <span class="badge badge-blue">${snap.size}</span></div>
          <span style="font-size:.75rem;color:var(--mu)">آخر 50 عمل</span>
        </div>
        <div class="sec-body">
          <table class="tbl">
            <thead><tr><th>العمل</th><th>النوع</th><th>الحالة</th><th>التفاعل</th><th>التاريخ</th><th>إجراء</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e){
    el.innerHTML = `<div class="empty">❌ خطأ: ${e.message}</div>`;
  }
}

// ─── USERS PAGE ───
async function loadUsers(){
  const el = document.getElementById("main-content");
  el.innerHTML = `<div class="loading"><span class="spinner"></span> جاري تحميل المستخدمين...</div>`;
  try{
    const snap = await getDocs(query(collection(db,"users"), orderBy("createdAt","desc"), limit(50)));
    if(snap.empty){ el.innerHTML = `<div class="section"><div class="empty">لا يوجد مستخدمون</div></div>`; return; }
    const rows = snap.docs.map(d=>{
      const u = d.data();
      const date = u.createdAt?.toDate ? u.createdAt.toDate().toLocaleDateString("ar-SA") : "—";
      const avStyle = u.avatar ? `background-image:url('${u.avatar}')` : `background:var(--red)`;
      const initials = (u.displayName||u.username||"?").charAt(0).toUpperCase();
      const isDisabled = u.disabled === true;
      return `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:.6rem">
              <div class="av" style="${avStyle}">${u.avatar?'':initials}</div>
              <div>
                <div style="font-weight:700;font-size:.85rem">${u.displayName||"—"}</div>
                <div style="font-size:.72rem;color:var(--mu)">@${u.username||"—"}</div>
              </div>
            </div>
          </td>
          <td style="color:var(--mu);font-size:.8rem">${u.email||"—"}</td>
          <td><span class="badge ${isDisabled?'badge-red':'badge-green'}">${isDisabled?'🔴 معطّل':'🟢 نشط'}</span></td>
          <td style="color:var(--mu);font-size:.8rem">📚 ${u.worksCount||0} &nbsp; 👥 ${u.followersCount||0}</td>
          <td style="color:var(--mu);font-size:.78rem">${date}</td>
          <td>
            <button class="btn ${isDisabled?'btn-green':'btn-red'}" onclick="toggleUser('${d.id}',${isDisabled})">
              ${isDisabled?'✅ تفعيل':'🚫 تعطيل'}
            </button>
          </td>
        </tr>`;
    }).join("");
    el.innerHTML = `
      <div class="section">
        <div class="sec-head">
          <div class="sec-title">👥 المستخدمون <span class="badge badge-blue">${snap.size}</span></div>
          <span style="font-size:.75rem;color:var(--mu)">آخر 50 مستخدم</span>
        </div>
        <div class="sec-body">
          <table class="tbl">
            <thead><tr><th>المستخدم</th><th>البريد</th><th>الحالة</th><th>النشاط</th><th>تاريخ التسجيل</th><th>إجراء</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e){
    el.innerHTML = `<div class="empty">❌ خطأ: ${e.message}</div>`;
  }
}

// ─── STATS PAGE ───
async function loadStatsPage(){
  const el = document.getElementById("main-content");
  el.innerHTML = `<div class="loading"><span class="spinner"></span> جاري تحميل الإحصائيات...</div>`;
  await loadStats();
  const s = _statsData;
  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-icon">📚</div>
        <div class="stat-num">${s.works||0}</div>
        <div class="stat-lbl">إجمالي الأعمال</div>
      </div>
      <div class="stat-box green">
        <div class="stat-icon">👥</div>
        <div class="stat-num">${s.users||0}</div>
        <div class="stat-lbl">إجمالي المستخدمين</div>
      </div>
      <div class="stat-box blue">
        <div class="stat-icon">👁</div>
        <div class="stat-num">${(s.totalViews||0).toLocaleString("ar")}</div>
        <div class="stat-lbl">إجمالي المشاهدات</div>
      </div>
      <div class="stat-box gold">
        <div class="stat-icon">🚩</div>
        <div class="stat-num">${s.reports||0}</div>
        <div class="stat-lbl">إجمالي البلاغات</div>
      </div>
    </div>
    <div class="section">
      <div class="sec-head"><div class="sec-title">📈 نظرة عامة</div></div>
      <div style="padding:1.5rem;display:grid;grid-template-columns:repeat(2,1fr);gap:1rem">
        <div style="background:var(--s3);border-radius:12px;padding:1.2rem">
          <div style="font-size:.8rem;color:var(--mu);margin-bottom:.4rem">معدل الأعمال لكل مستخدم</div>
          <div style="font-size:1.5rem;font-weight:900">${s.users?((s.works/s.users).toFixed(1)):0}</div>
        </div>
        <div style="background:var(--s3);border-radius:12px;padding:1.2rem">
          <div style="font-size:.8rem;color:var(--mu);margin-bottom:.4rem">معدل المشاهدات لكل عمل</div>
          <div style="font-size:1.5rem;font-weight:900">${s.works?Math.round(s.totalViews/s.works):0}</div>
        </div>
      </div>
    </div>`;
}

// ─── ACTIONS ───
window.viewWork = function(workId){
  window.open(`/#/work/${workId}`, "_blank");
};

window.confirmDeleteWork = function(workId, reportId){
  document.getElementById("confirm-title").textContent = "🗑 حذف العمل";
  document.getElementById("confirm-msg").innerHTML =
    `هل أنت متأكد من حذف هذا العمل؟ <strong>لا يمكن التراجع عن هذا الإجراء.</strong>`;
  document.getElementById("confirm-ok-btn").onclick = ()=> doDeleteWork(workId, reportId);
  openModal("m-confirm");
};

async function doDeleteWork(workId, reportId){
  closeModal("m-confirm");
  try{
    await deleteDoc(doc(db,"works",workId));
    if(reportId) await deleteDoc(doc(db,"reports",reportId));
    toast("✅ تم حذف العمل بنجاح","s");
    await loadStats();
    if(_curTab==="reports") loadReports();
    else if(_curTab==="works") loadWorks();
  } catch(e){ toast("❌ فشل الحذف: "+e.message,"e"); }
}

window.dismissReport = async function(reportId){
  try{
    await deleteDoc(doc(db,"reports",reportId));
    toast("✅ تم تجاهل البلاغ","s");
    loadReports();
  } catch(e){ toast("❌ فشل: "+e.message,"e"); }
};

window.toggleUser = async function(uid, isDisabled){
  try{
    await updateDoc(doc(db,"users",uid),{ disabled: !isDisabled });
    toast(isDisabled?"✅ تم تفعيل الحساب":"🚫 تم تعطيل الحساب", isDisabled?"s":"");
    loadUsers();
  } catch(e){ toast("❌ فشل: "+e.message,"e"); }
};

window.doSignOut = async function(){
  await signOut(auth);
  window.location.href = "/";
};

// ─── HELPERS ───
window.openModal = function(id){ document.getElementById(id)?.classList.add("open"); };
window.closeModal = function(id){ document.getElementById(id)?.classList.remove("open"); };
document.querySelectorAll(".mo").forEach(o=>o.addEventListener("click",function(e){if(e.target===this)closeModal(this.id);}));

let _tt;
window.toast = function(msg, type=""){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (type==="e"?" e":type==="s"?" s":"");
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove("show"),3500);
};
</script>
</body>
</html>
